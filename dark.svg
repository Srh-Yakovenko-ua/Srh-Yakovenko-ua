<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" fill="none" role="img" aria-label="Serhii Yakovenko — Full-Stack Developer">
  <title>Serhii Yakovenko — Full-Stack Developer</title>
  <defs>
    <clipPath id="round"><rect x="0" y="0" width="1180" height="610" rx="28"/></clipPath>
    <clipPath id="leftClip"><rect x="28" y="28" width="420" height="554" rx="20"/></clipPath>

    <linearGradient id="accent" gradientUnits="userSpaceOnUse" x1="480" y1="60" x2="1120" y2="560" spreadMethod="reflect">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#10B981"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-120,0; 120,0; -120,0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="ascii" gradientUnits="userSpaceOnUse" x1="120" y1="150" x2="360" y2="470" spreadMethod="reflect">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.45" stop-color="#818CF8"/>
      <stop offset="0.75" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#22D3EE"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="0,0; 70,90; 0,0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="nameGrad" gradientUnits="userSpaceOnUse" x1="500" y1="150" x2="960" y2="185" spreadMethod="reflect">
