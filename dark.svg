    <clipPath id="rc1"><rect x="500" y="190" width="0" height="34"><animate attributeName="width" values="0;0;299;299;0;0" keyTimes="0;0.15;0.25;0.35;0.4;1" dur="12s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="rc2"><rect x="500" y="190" width="0" height="34"><animate attributeName="width" values="0;0;143;143;0;0" keyTimes="0;0.4;0.5;0.6;0.65;1" dur="12s" repeatCount="indefinite"/></rect></clipPath>
